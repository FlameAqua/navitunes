version: 2
updates:
  # Gradle dependencies (version catalog + build scripts).
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      androidx:
        patterns: ["androidx.*"]
      kotlin-coroutines:
        patterns: ["org.jetbrains.kotlin*", "org.jetbrains.kotlinx*"]

  # Keep the GitHub Actions in our workflows current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
