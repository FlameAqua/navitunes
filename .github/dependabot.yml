version: 2
updates:
  # Gradle dependencies (version catalog + build scripts), grouped to keep the
  # PR count low — related bumps land together instead of one PR each.
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      androidx:
        patterns: ["androidx.*"]
      kotlin:
        patterns: ["org.jetbrains.kotlin*", "org.jetbrains.kotlinx*"]
      build-tools:
        patterns: ["com.android.*", "com.google.devtools.ksp*"]
      other:
        patterns: ["*"]

  # All GitHub Actions bumps collapse into a single weekly PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
