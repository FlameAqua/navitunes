name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Least-privilege by default; individual jobs widen scope only where needed.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Bootstrap Gradle wrapper if missing
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 9.5.1
          fi
          chmod +x gradlew

      - name: Android Lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: navitunes-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload lint & test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reports-${{ github.sha }}
          path: |
            app/build/reports/lint-results-*.html
            app/build/reports/tests/**
          if-no-files-found: ignore

  sbom:
    name: SBOM & vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Generate a CycloneDX SBOM of the whole project (resolved Gradle deps).
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: navitunes-sbom.cyclonedx.json
          output-file: navitunes-sbom.cyclonedx.json

      # Fail the build if the SBOM contains known high/critical vulnerabilities.
      - name: Scan SBOM for vulnerabilities (Grype)
        uses: anchore/scan-action@v7
        with:
          sbom: navitunes-sbom.cyclonedx.json
          fail-build: true
          severity-cutoff: high

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.sha }}
          path: navitunes-sbom.cyclonedx.json
          if-no-files-found: error

  dependency-review:
    name: Dependency review
    # PR-only, and advisory: Dependabot PRs run with a read-only token, so this is
    # non-blocking (the real gates are build/test, CodeQL, and the Grype SBOM scan).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
