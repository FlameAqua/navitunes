name: Release

# Trigger by pushing a semver tag, e.g.:  git tag v0.5.0 && git push origin v0.5.0
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bootstrap Gradle wrapper if missing
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 9.5.1
          fi
          chmod +x gradlew

      # Derive versionName + a monotonic versionCode from the tag (v0.5.1 -> 0.5.1 / 50101).
      - name: Derive version from tag
        id: ver
        run: |
          VER="${GITHUB_REF_NAME#v}"
          CORE="${VER%%-*}"
          IFS='.' read -r MA MI PA <<< "$CORE"
          CODE=$(( 10#${MA:-0} * 10000 + 10#${MI:-0} * 100 + 10#${PA:-0} ))
          echo "name=$VER"  >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Building versionName=$VER versionCode=$CODE"

      - name: Verify signing secrets are configured
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Tagged releases require KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD secrets. See README."
            exit 1
          fi

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "${RUNNER_TEMP}/release.keystore"
          cat > release-keystore.properties <<EOF
          storeFile=${RUNNER_TEMP}/release.keystore
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Assemble signed release APK
        run: >
          ./gradlew :app:assembleRelease --stacktrace
          -PversionName=${{ steps.ver.outputs.name }}
          -PversionCode=${{ steps.ver.outputs.code }}

      - name: Stage release assets
        id: stage
        run: |
          mkdir -p dist
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          NAME="navitunes-v${{ steps.ver.outputs.name }}.apk"
          cp "$APK" "dist/$NAME"
          ( cd dist && sha256sum "$NAME" > "$NAME.sha256" )
          SHA=$(cut -d' ' -f1 "dist/$NAME.sha256")
          cat > dist/latest.json <<EOF
          {
            "versionName": "${{ steps.ver.outputs.name }}",
            "versionCode": ${{ steps.ver.outputs.code }},
            "tag": "${GITHUB_REF_NAME}",
            "apk": "$NAME",
            "sha256": "$SHA"
          }
          EOF
          echo "apk_name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/navitunes-v${{ steps.ver.outputs.name }}.sbom.cyclonedx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ steps.stage.outputs.apk_name }}
            dist/${{ steps.stage.outputs.apk_name }}.sha256
            dist/latest.json
            dist/navitunes-v${{ steps.ver.outputs.name }}.sbom.cyclonedx.json
          generate_release_notes: true
          fail_on_unmatched_files: true
